<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="540" viewBox="0 0 1060 540" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <!-- Terminal rendering of a real clipring session (output copied verbatim
       from a local run inside tmux over SSH, 2026-07-13). -->
  <rect width="1060" height="540" rx="10" fill="#1c2128"/>
  <rect width="1060" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1060" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="530" y="22" text-anchor="middle" fill="#909dab">deploy@staging (ssh, tmux) — clipboard history that follows you home</text>

  <g fill="#adbac7">
    <text x="24" y="68"><tspan fill="#6cb6ff">deploy@staging$</tspan> journalctl -u api | grep ERROR | tail -1 | clipring copy</text>
    <text x="24" y="94" fill="#768390">clipring: copied 96 B -&gt; clipboard via /dev/tty [tmux] (history: 3/50)</text>
    <text x="24" y="120" fill="#57ab5a">        ^ your LOCAL clipboard just changed — no X forwarding, no daemon</text>

    <text x="24" y="172"><tspan fill="#6cb6ff">deploy@staging$</tspan> clipring list</text>
    <text x="24" y="198" fill="#909dab">    0   now      96 B  Jul 13 09:41:02 api[712]: ERROR payment webhook timed …</text>
    <text x="24" y="224" fill="#909dab">    1    4m      37 B  kubectl logs -f api-7d4b9c --tail=100</text>
    <text x="24" y="250" fill="#909dab">*   2    2h      46 B  ssh -L 5432:127.0.0.1:5432 deploy@example.test</text>

    <text x="24" y="302"><tspan fill="#6cb6ff">deploy@staging$</tspan> clipring pick   <tspan fill="#768390"># grab the pinned tunnel command again</tspan></text>
    <text x="24" y="328" fill="#909dab">pick (0-2, q to cancel)&gt; <tspan fill="#adbac7">2</tspan></text>
    <text x="24" y="354" fill="#768390">clipring: re-copied entry 2 (46 B) via /dev/tty</text>

    <text x="24" y="406"><tspan fill="#6cb6ff">deploy@staging$</tspan> clipring paste 1 | sh   <tspan fill="#768390"># or re-use it right here, byte-identical</tspan></text>

    <text x="24" y="458" fill="#768390"># same ring, same commands, zero setup — through ssh, tmux and screen,</text>
    <text x="24" y="484" fill="#768390"># because the copy is an OSC 52 escape riding the terminal byte stream.</text>
    <text x="24" y="510"><tspan fill="#57ab5a">SMOKE OK</tspan><tspan fill="#768390">  (cargo test: 92 passed · scripts/smoke.sh)</tspan></text>
  </g>
</svg>
